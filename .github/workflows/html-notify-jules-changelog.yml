name: HTML Notify - Jules Changelog

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: html-notify-jules-changelog
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Fetch Jules Changelog
        id: fetch
        run: npx tsx src/scripts/fetch-html-jules-changelog.ts

      - name: Ensure output directories
        if: steps.fetch.outputs.has_changes == 'true'
        run: mkdir -p data/html-summaries

      - name: Translate with Claude
        if: steps.fetch.outputs.has_changes == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            あなたはニュース記事の翻訳エキスパートです。
            Jules Changelog の記事データを処理し、Slack 通知に適した形式に変換してください。

            ## タスク

            data/html-current/jules-changelog.json を読み取ってください。
            このファイルは JSON 配列で、各要素は以下の構造を持ちます:
            { dateSlug, title, date, contentEn, fetchedAt }

            各記事について以下の処理を行い、結果を data/html-summaries/jules-changelog.json に書き出してください。

            ## 処理ルール

            ### 言語判定と翻訳

            - contentEn フィールドのテキストが英語の場合: 日本語に翻訳する
            - contentEn フィールドのテキストが日本語の場合: そのまま使用する

            ### 全文翻訳（fullTextJa）

            - 本文全文を日本語に翻訳して保持する（日本語の場合はそのまま）
            - Markdown 形式を維持する
            - 要約は不要（記事が短いため親メッセージに全文を含める）

            ## 出力仕様

            結果を data/html-summaries/jules-changelog.json に JSON 配列で書き出してください。

            出力スキーマ（配列の各要素）:
            { "dateSlug": "string (入力からコピー)", "title": "string (入力からコピー)", "date": "string (入力からコピー)", "fullTextJa": "string (日本語全文)" }

            ## 制約

            - 入力配列の順序を維持すること
            - dateSlug, title, date フィールドは入力からそのままコピーすること
            - fullTextJa は必ず日本語で出力すること

            ## 検証

            書き出し後、以下のコマンドで JSON を検証してください:
            npx tsx src/scripts/validate-news-summary.ts jules-changelog
            検証に失敗した場合は、エラーメッセージを読み取り、JSON を修正して再度検証してください。
          claude_args: "--max-turns 20 --allowedTools Read,Write,Bash"

      - name: Post to Slack
        if: steps.fetch.outputs.has_changes == 'true'
        run: npx tsx src/scripts/notify-html-jules-changelog.ts
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID_JULES_CHANGELOG: ${{ secrets.SLACK_CHANNEL_ID_JULES_CHANGELOG }}

      - name: Commit state
        if: steps.fetch.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git add data/state/jules-changelog.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update html source state [jules-changelog]"
          git checkout -- . || true
          git clean -fd || true
          git pull --rebase && git push
