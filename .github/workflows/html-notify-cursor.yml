name: HTML Notify - Cursor

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: html-notify-cursor
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Fetch Cursor changelog
        id: fetch
        run: npx tsx src/scripts/fetch-html-cursor.ts

      - name: Ensure output directories
        if: steps.fetch.outputs.has_changes == 'true'
        run: mkdir -p data/html-summaries

      - name: Convert to Slack blocks with Claude
        if: steps.fetch.outputs.has_changes == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            あなたは Slack 通知フォーマッターです。
            Cursor エディタの changelog データを Slack Block Kit 形式に正確に変換する専門家として振る舞ってください。

            ## タスク

            data/html-current/cursor.json を読み取ってください。
            このファイルは JSON 配列で、各要素は1つのバージョンのデータです。
            各要素の rscPayload フィールドの React Server Components データを解析して
            Slack Block Kit 形式の JSON に変換してください。

            ## 入力仕様

            data/html-current/cursor.json の構造（配列）:
            各要素:
            - version (string): バージョン番号（例: "2.5"）
            - rscPayload (string): RSC 形式の article データ。Next.js の React Server Components ペイロード。
              コンポーネントは ["$","tagName",key,{props}] 形式で表現される。
              例: ["$","p",null,{"children":"テキスト"}]
            - articleHtml (string): 参照用 DOM HTML（画像 URL のデコードに使用）
            - muxVideos (array): Mux 動画情報の配列
              各要素: { playbackId: string, thumbnailUrl: string, hlsUrl: string }

            ## 変換ルール

            ### テキスト要素
            - RSC の ["$","h3",...] → divider ブロック + section ブロック（"*見出しテキスト*" bold 形式）
            - RSC の ["$","p",...] → section ブロック（type: mrkdwn）。連続する短い p は1つの section にまとめてよい
            - RSC の ["$","ul",...] 内 ["$","li",...] → 各項目を "• テキスト" 形式でリスト化

            ### インライン要素（Slack mrkdwn 記法）
            - ["$","a",null,{"href":"url","children":"text"}] → "<url|text>"
            - ["$","code",null,{"children":"text"}] → "`text`"
            - ["$","strong",null,{"children":"text"}] → "*text*"

            ### メディア要素
            - RSC の ["$","figure",...] や ["$","$L23",...] 内の画像:
              image ブロック {"type":"image","image_url":"URL","alt_text":"Cursor {version}"}
              ※ Next.js image proxy URL（/_next/image?url=ENCODED&w=...）はデコードして元 URL を使用
            - muxVideos 配列の各動画:
              image ブロック（サムネイル）+ section ブロック "🎬 <{hlsUrl}|動画を再生>"

            ### Accordion セクション
            - RSC の $L1b（Accordion）/$L1c（AccordionItem）/$L1f（AccordionContent）:
              ボタンラベル（例: "全般 (6)"）を見出しとして section に含める。
              $L1f 内の ul/li を箇条書きリストとして展開する。

            ### ブロック構成
            1. 先頭は必ず header ブロック: "Cursor {version} の更新"
            2. セクション間（h3 の前）に divider ブロックを挿入
            3. 各 section.text は 3000 文字以内。超える場合は複数 section に分割

            ## 制約
            - テキストは入力データの日本語をそのまま使用（翻訳・要約はしない）
            - image_url は公開 HTTPS URL であること

            ## 出力
            結果を data/html-summaries/cursor.json に JSON 配列で書き出してください。
            入力配列の各要素に対して、変換結果を出力配列の対応する要素に格納してください。
            出力スキーマ（配列の各要素）:
            - version (string): バージョン番号
            - fallbackText (string): Slack の通知テキスト（例: "Cursor 2.5 の更新"）
            - blocks (array): Slack Block Kit ブロック配列
              - header: { type: "header", text: { type: "plain_text", text: string (150文字以内), emoji: true } }
              - section: { type: "section", text: { type: "mrkdwn", text: string (3000文字以内) } }
              - divider: { type: "divider" }
              - image: { type: "image", image_url: string (HTTPS URL), alt_text: string }

            ## 検証
            書き出し後、以下のコマンドで JSON を検証してください:
            npx tsx src/scripts/validate-cursor-summary.ts
            検証に失敗した場合は、エラーメッセージを読み取り、JSON を修正して再度検証してください。
          claude_args: "--max-turns 20 --allowedTools Read,Write,Bash"

      - name: Post to Slack
        if: steps.fetch.outputs.has_changes == 'true'
        run: npx tsx src/scripts/notify-html-cursor.ts
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID_CURSOR: ${{ secrets.SLACK_CHANNEL_ID_CURSOR }}

      - name: Commit state
        if: steps.fetch.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git add data/state/cursor.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update html source state [cursor]"
          git checkout -- . || true
          git clean -fd || true
          git pull --rebase && git push
