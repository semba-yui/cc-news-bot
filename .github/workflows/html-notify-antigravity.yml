name: HTML Notify - Antigravity

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: html-notify-antigravity
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Fetch Antigravity changelog
        id: fetch
        run: npx tsx src/scripts/fetch-html-antigravity.ts

      - name: Ensure output directories
        if: steps.fetch.outputs.has_changes == 'true'
        run: mkdir -p data/html-summaries

      - name: Translate with Claude
        if: steps.fetch.outputs.has_changes == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            data/html-current/antigravity.json を読み取ってください。
            このファイルは JSON 配列で、各要素は以下の構造を持ちます:
            { version, improvementsEn, fixesEn, patchesEn, fetchedAt }

            各要素の improvementsEn・fixesEn・patchesEn の配列内テキストを日本語に翻訳し、
            それぞれ improvementsJa・fixesJa・patchesJa に置き換えてください。
            version フィールドはそのままコピーしてください。
            出力も同じ配列構造を維持し、data/html-summaries/antigravity.json に書き出してください。
            出力スキーマ: [{ version, improvementsJa, fixesJa, patchesJa }]
          claude_args: "--max-turns 20 --allowedTools Read,Write"

      - name: Post to Slack
        if: steps.fetch.outputs.has_changes == 'true'
        run: npx tsx src/scripts/notify-html-antigravity.ts
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID_ANTIGRAVITY: ${{ secrets.SLACK_CHANNEL_ID_ANTIGRAVITY }}

      - name: Commit state
        if: steps.fetch.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git add data/state/antigravity.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update html source state [antigravity]"
          git checkout -- . || true
          git clean -fd || true
          git pull --rebase && git push
