name: HTML Notify - OpenAI News

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: html-notify-openai-news
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Fetch OpenAI News
        id: fetch
        run: npx tsx src/scripts/fetch-html-openai-news.ts

      - name: Ensure output directories
        if: steps.fetch.outputs.has_changes == 'true'
        run: mkdir -p data/html-summaries

      - name: Translate with Claude
        if: steps.fetch.outputs.has_changes == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: .github/prompts/translate-openai-news.md
          claude_args: "--max-turns 20 --allowedTools Read,Write,Bash"

      - name: Post to Slack
        if: steps.fetch.outputs.has_changes == 'true'
        run: npx tsx src/scripts/notify-html-openai-news.ts
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID_OPENAI_NEWS: ${{ secrets.SLACK_CHANNEL_ID_OPENAI_NEWS }}

      - name: Commit state
        if: steps.fetch.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          git add data/state/openai-news.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: update html source state [openai-news]"
          git checkout -- . || true
          git clean -fd || true
          git pull --rebase && git push
